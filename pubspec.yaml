name: dairy_frontend
description: MindFleet Dairy - AI-native OS for Dairy Distribution Businesses
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  go_router: ^14.0.0
  flutter_colorpicker: ^1.0.0
  image_picker: ^1.0.0
  email_validator: ^2.1.0
  lottie: ^3.0.0
  intl: ^0.19.0
  uuid: ^4.0.0
  path: ^1.9.0
  mime: ^1.0.0
  http_parser: ^4.0.0
  flutter_haptics: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
